name: '🚀 Release Plugin'

on:
  release:
    types: [ released ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Create plugin zip
        run: |
          mkdir -p staging
          cp bin/Release/net9.0/JellyfinPRRating.dll staging/
          cp meta.json staging/
          cd staging
          zip -r ../JellyfinPRRating.zip .

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum JellyfinPRRating.zip | awk '{print $1}')
          echo "md5=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            JellyfinPRRating.zip \
            --clobber

      - name: Update manifest on master
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          # Manifest versions are four-part (match meta.json)
          case "$VERSION" in
            *.*.*.*) ;;
            *) VERSION="$VERSION.0" ;;
          esac
          export VERSION TAG
          export CHECKSUM="${{ steps.checksum.outputs.md5 }}"
          export TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          python3 - <<'EOF'
          import json, os
          with open('manifest.json') as f:
              manifest = json.load(f)
          entry = {
              'version': os.environ['VERSION'],
              'changelog': 'See release notes on GitHub',
              'targetAbi': '10.11.0.0',
              'sourceUrl': f"https://github.com/GhostPratt/JellyfinPRRating/releases/download/{os.environ['TAG']}/JellyfinPRRating.zip",
              'checksum': os.environ['CHECKSUM'],
              'timestamp': os.environ['TIMESTAMP'],
          }
          versions = [v for v in manifest[0]['versions'] if v['version'] != entry['version']]
          manifest[0]['versions'] = [entry] + versions
          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest for $TAG"
          git push origin master